steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t=gcr.io/$PROJECT_ID/sloaneadler:$COMMIT_SHA'
      - '-t=gcr.io/$PROJECT_ID/sloaneadler:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/sloaneadler'

  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'sloaneadler'
      - '--image=gcr.io/$PROJECT_ID/sloaneadler:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--concurrency=80'
      - '--max-instances=10'
      - '--min-instances=0'
      - '--timeout=300s'
      - '--set-env-vars=NODE_ENV=production'
      - '--set-secrets=SITE_PASSWORD=site-password:latest'

options:
  machineType: 'E2_MEDIUM'

images:
  - 'gcr.io/$PROJECT_ID/sloaneadler:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/sloaneadler:latest'
